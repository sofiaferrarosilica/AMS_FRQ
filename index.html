<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMS — Frequently Asked Questions</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@300;400;500&family=Barlow+Semi+Condensed:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy-900: #050e1f;
    --navy-800: #0a1931;
    --navy-700: #0f2547;
    --navy-600: #163260;
    --navy-500: #1e4080;
    --navy-400: #2a56a6;
    --navy-300: #3a72cc;
    --navy-200: #6a9ee0;
    --navy-100: #b0caee;
    --navy-50:  #ddeaf8;
    --blue:     #1a2fff;
    --blue-mid: #2a56a6;
    --white:    #f4f8ff;
    --muted:    #8aa5c8;
    --charcoal: #c8d8ee;
    --border:   rgba(58,114,204,0.22);
    --card-bg:  rgba(10,25,49,0.82);
    --open-bg:  rgba(26,47,255,0.08);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--navy-900);
    color: var(--white);
    font-family: 'Barlow', sans-serif;
    font-weight: 400;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* grid background */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(42,86,166,0.07) 1px, transparent 1px),
      linear-gradient(90deg, rgba(42,86,166,0.07) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }
  /* glow blob */
  body::after {
    content: '';
    position: fixed;
    top: -200px; left: 50%; transform: translateX(-50%);
    width: 900px; height: 600px;
    background: radial-gradient(ellipse, rgba(30,64,128,0.45) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── Header ── */
  header {
    position: relative; z-index: 1;
    background: rgba(5,14,31,0.75);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }
  header::after {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--navy-300), transparent);
  }

  .header-inner {
    max-width: 900px;
    margin: 0 auto;
    padding: 28px 28px 24px;
    display: flex;
    align-items: center;
    gap: 26px;
  }

  .logo-img {
    height: 68px; width: auto; flex-shrink: 0;
    filter: brightness(0) invert(1);
    opacity: 0.92;
  }

  .header-text h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: clamp(1.6rem, 3.2vw, 2.4rem);
    color: var(--white);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    line-height: 1.1;
    background: linear-gradient(135deg, var(--white) 40%, var(--navy-200));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header-text p {
    font-size: 0.78rem;
    color: var(--muted);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-top: 5px;
    font-family: 'Barlow Semi Condensed', sans-serif;
    font-weight: 500;
  }

  /* ── Page wrap ── */
  .page-wrap {
    position: relative; z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 32px 24px 72px;
  }

  /* ── Controls ── */
  .controls { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 18px; }
  .search-wrap { position: relative; flex: 1; min-width: 180px; max-width: 320px; }
  .search-wrap svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
  .search-wrap input {
    width: 100%;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 9px 12px 9px 34px;
    font-family: 'Barlow', sans-serif;
    font-size: 0.88rem;
    color: var(--white);
    outline: none;
    transition: border-color 0.18s;
    backdrop-filter: blur(8px);
  }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-wrap input:focus { border-color: var(--navy-300); }

  /* ── Category pills ── */
  .cat-bar { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 20px; }
  .cat-pill {
    padding: 5px 13px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'Barlow Semi Condensed', sans-serif;
    font-size: 0.74rem;
    font-weight: 600;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }
  .cat-pill:hover { border-color: var(--navy-300); color: var(--white); }
  .cat-pill.active { background: var(--navy-500); border-color: var(--navy-300); color: var(--white); }

  /* ── Count ── */
  .count-row { font-size: 0.73rem; color: var(--muted); font-family: 'Barlow Semi Condensed', sans-serif; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 12px; }

  /* ── FAQ list ── */
  #faq-list { display: flex; flex-direction: column; gap: 8px; }

  .faq-item {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    backdrop-filter: blur(12px);
    transition: border-color 0.2s, box-shadow 0.2s;
    animation: fadeUp 0.3s ease both;
  }
  .faq-item:hover { border-color: rgba(58,114,204,0.45); box-shadow: 0 4px 22px rgba(5,14,31,0.6); }
  .faq-item.hidden { display: none; }
  .faq-item.open { border-color: rgba(58,114,204,0.5); }

  .faq-q {
    width: 100%; display: flex; align-items: center; gap: 13px;
    padding: 17px 20px;
    background: transparent; border: none; cursor: pointer; text-align: left;
    font-family: 'Barlow Semi Condensed', sans-serif;
    font-size: 0.96rem; font-weight: 600;
    color: var(--white);
    transition: background 0.15s;
  }
  .faq-q:hover { background: rgba(42,86,166,0.1); }
  .faq-item.open .faq-q { background: rgba(26,47,255,0.08); }

  .q-num { flex-shrink: 0; font-family: 'Barlow Condensed', sans-serif; font-size: 0.7rem; font-weight: 700; color: var(--navy-200); letter-spacing: 0.06em; min-width: 22px; padding-top: 1px; }
  .q-text { flex: 1; line-height: 1.35; }
  .q-cat {
    font-size: 0.66rem; padding: 3px 9px; border-radius: 20px;
    background: rgba(42,86,166,0.18); color: var(--navy-200);
    border: 1px solid rgba(42,86,166,0.3);
    font-family: 'Barlow Semi Condensed', sans-serif; font-weight: 600;
    letter-spacing: 0.05em; text-transform: uppercase; white-space: nowrap; flex-shrink: 0;
  }
  .chevron { flex-shrink: 0; color: var(--muted); transition: transform 0.24s; width: 17px; height: 17px; }
  .faq-item.open .chevron { transform: rotate(180deg); color: var(--navy-200); }

  .faq-a { max-height: 0; overflow: hidden; transition: max-height 0.34s ease; }
  .faq-item.open .faq-a { max-height: 900px; }
  .faq-a-inner {
    padding: 14px 20px 20px 55px;
    font-size: 0.89rem; color: #a8c4e0; line-height: 1.82;
    border-top: 1px solid var(--border);
    background: rgba(5,14,31,0.3);
  }

  /* ── No results ── */
  #no-results { display: none; text-align: center; padding: 48px 20px; color: var(--muted); font-size: 0.88rem; }

  /* ── Footer ── */
  footer {
    position: relative; z-index: 1;
    margin-top: 52px; text-align: center;
    font-size: 0.7rem; color: rgba(138,165,200,0.35);
    font-family: 'Barlow Semi Condensed', sans-serif;
    letter-spacing: 0.1em; text-transform: uppercase;
  }
  footer img { display: block; height: 26px; margin: 0 auto 8px; opacity: 0.12; filter: brightness(0) invert(1); }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  @media(max-width:560px) {
    .header-inner { flex-direction: column; align-items: flex-start; gap: 14px; }
    .logo-img { height: 48px; }
    .q-cat { display: none; }
    .faq-a-inner { padding-left: 20px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <img class="logo-img" src="https://raw.githubusercontent.com/sofiaferrarosilica/AMS_FRQ/main/ams-logo.png" alt="Advanced Material Solutions">
    <div class="header-text">
      <h1>Frequently Asked Questions</h1>
      <p>Engineering &amp; Process Reference &nbsp;&middot;&nbsp; Missoula, MT</p>
    </div>
  </div>
</header>

<div class="page-wrap">

  <div class="controls">
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search-input" placeholder="Search questions&hellip;" oninput="filterFAQ()">
    </div>
  </div>

  <div class="cat-bar" id="cat-bar"></div>
  <div class="count-row" id="count-badge"></div>
  <div id="faq-list"></div>
  <div id="no-results">
    <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin:0 auto 10px;display:block;opacity:.35"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    No questions match your search.
  </div>

</div>

<footer>
  <img src="https://raw.githubusercontent.com/sofiaferrarosilica/AMS_FRQ/main/ams-logo.png" alt="AMS">
  Advanced Material Solutions &nbsp;&middot;&nbsp; Missoula, MT &nbsp;&middot;&nbsp; Company Confidential 
</footer>

<script>
/* =============================================================
   EDIT YOUR FAQ HERE
   Add, remove, or change entries in this array.
   Each entry needs: cat (category), q (question), a (answer).
   Use \n inside answers for line breaks.
   Save the file and re-upload to GitHub when done.
============================================================= */
const FAQ_DATA = [
  {
    cat: "Getting Started",
    q: "How do I get access to a SharePoint Site or File?",
    a: "Request access to a named site via formal request to site owner. [insert image of requesting site permissions] Or, email ferraro@silicongases.com for permissions directly, as requests can go unseen. Similarly with folders, follow the same steps. [Insert image of requesting folder permissions]"
  },
  {
    cat: "Getting Started",
    q: "Where can I find the IT Employee Handbook?",
    a: "On this site, click on the attached link next to 'IT Resources'. Alternatively, access Hub Documents under the 'Documents' tab on the toolbar at the top of the screen, where you can find it within the 'Handbooks and SOP's' file."
  },
  {
    cat: "Getting Started",
    q: "How do I manage Multifactor Authentication - Including Setup?",
    a: "Download the Microsoft Multifactor Authentication app on your mobile device's app store [insert image of app]. Signing in for the first time, you'll be prompted to scan a QR code to register device [insert screen and internal app to add device]. If you need to reset your MFA, please email your current IT to revoke the past registery. For any confusion, please reference 'MFA Setup' word document in 'Handbooks and SOP's' under Hub Documents"
  },
  {
    cat: "Getting Started",
    q: "How do I Sync Sharepoint Files to my Computer?",
    a: "Go to the repository you want to sync (either a file or documents of the whole page) and find the sync icon on the top right. If it doesn't appear, try expanding options with the three dots [insert two images - sync and dots]. Then, check your devices files. You should see advmatsolutions appear just above 'My PC', where your synced files will follow. If you don't see anything in your files right away - don't be spooked! Sometimes big data takes a longer time to sync."
  },
  {
    cat: "Getting started",
    q: "I'm traveling to another country, which VPN do I use?",
    a: "VPN's are assigned through support@technellogic.com, email them to either be provided a VPN through NordLayer or Ubiquiti (for China travelers due to VPN laws). Users are not permitted to procure their own VPN solution."
  },
  {
    cat: "Access & Permissions",
    q: "How do I reset my Password?",
    a: "It's important to cycle through passwords for your own security, and that of the company's. It's reccomended a reset at least once a year. To reset, go to this page: https://myaccount.microsoft.com/. If you are unable to reset your password, please contact current IT to manually reset."
  },
  {
    cat: "Access & Permissions",
    q: "I requested access, but haven't heard back or am having issues reaching the site - what do I do?",
    a: "If you've not heard back about updating site permissions, or have but are experiencing issues - please put in a formal ticket with support@technellogic.com"
  },
  {
    cat: "Hardware and Equipment",
    q: "Who do I contact about a broken or slow computer?",
    a: "Reach out to current IT - create a ticket if the issue persists after origional help."
  },
  {
    cat: "Hardware and Equipment",
    q: "How do I request new hardware or equipment?",
    a: "For accessories such as computer equipment and IT related help, please contact current in-house IT from ferraro@silicongases.com. All equipment is ordered by Josh taybor@silicongases.com, or gone through AJ jessop@semilinkmat.com"
  },
  {
    cat: "Security and Best Practices",
    q: "What apps can I use to access company data?",
    a: "Only apps signed in and verified through @silicongases or @semilinkmat emails. AMS approved apps can be found in the IT Handbook [insert file]. To list a few: AI - Claude and ChatGPT company accounts; PDF Editors - Bluebeam and AdobePro; Drafting Software - ChemCad, AutoCad; and many others. To see the full list, go to 'Software Information' on the homepage, or access the Software Documents folder in 'Documents' [insert file]"
  },
  {
    cat: "Security and Best Practices",
    q: "What do I do if I think I clicked a phishing email?",
    a: "If you think you clicked a link or opened a susipcious attachment, act immediately. First, disconnect your computer from the internet, do not click antyhing else on the page, and contact support@technellogic.com immediately - do not wait for the next workday. If you are unsure about any emails, forward the email to ferraro@silicongases.com. Microsoft Defendr is running on all AMS computers - but this does not mean you are invulnerable to threats. When in doubt: do not click."
  },
];
/* ===================== END EDIT BLOCK ===================== */

let activecat = 'all';

function getCategories() {
  return [...new Set(FAQ_DATA.map(f => f.cat))].sort();
}

function renderCatBar() {
  const bar = document.getElementById('cat-bar');
  bar.innerHTML = '';
  const allBtn = document.createElement('button');
  allBtn.className = 'cat-pill' + (activecat === 'all' ? ' active' : '');
  allBtn.dataset.cat = 'all'; allBtn.textContent = 'All';
  allBtn.onclick = function(){ filterCat(this); };
  bar.appendChild(allBtn);
  getCategories().forEach(c => {
    const b = document.createElement('button');
    b.className = 'cat-pill' + (activecat === c ? ' active' : '');
    b.dataset.cat = c; b.textContent = c;
    b.onclick = function(){ filterCat(this); };
    bar.appendChild(b);
  });
}

function renderList() {
  const list  = document.getElementById('faq-list');
  const query = document.getElementById('search-input').value.toLowerCase().trim();
  list.innerHTML = '';
  let shown = 0;
  FAQ_DATA.forEach((item, idx) => {
    const catMatch  = activecat === 'all' || item.cat === activecat;
    const textMatch = !query ||
      item.q.toLowerCase().includes(query) ||
      item.a.toLowerCase().includes(query) ||
      item.cat.toLowerCase().includes(query);
    const div = document.createElement('div');
    div.className = 'faq-item' + (!catMatch || !textMatch ? ' hidden' : '');
    div.style.animationDelay = (shown * 0.03) + 's';
    if (catMatch && textMatch) shown++;
    div.innerHTML =
      '<button class="faq-q" onclick="toggleItem(this)">' +
        '<span class="q-num">Q' + (idx+1) + '</span>' +
        '<span class="q-text">' + esc(item.q) + '</span>' +
        '<span class="q-cat">' + esc(item.cat) + '</span>' +
        '<svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="6 9 12 15 18 9"/></svg>' +
      '</button>' +
      '<div class="faq-a"><div class="faq-a-inner">' + fmtA(item.a) + '</div></div>';
    list.appendChild(div);
  });
  document.getElementById('no-results').style.display = shown === 0 ? 'block' : 'none';
  document.getElementById('count-badge').textContent = shown + ' of ' + FAQ_DATA.length + ' question' + (FAQ_DATA.length !== 1 ? 's' : '');
}

function fmtA(t) { return esc(t).replace(/\n/g,'<br>'); }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function toggleItem(btn) {
  const item = btn.closest('.faq-item');
  const wasOpen = item.classList.contains('open');
  document.querySelectorAll('.faq-item.open').forEach(i => i.classList.remove('open'));
  if (!wasOpen) item.classList.add('open');
}

function filterFAQ() { renderList(); }
function filterCat(el) {
  document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  activecat = el.dataset.cat;
  renderList();
}

renderCatBar();
renderList();
</script>
</body>
</html>
